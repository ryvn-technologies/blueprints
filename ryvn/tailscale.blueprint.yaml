# yaml-language-server: $schema=https://api.ryvn.app/v1/schemas/resources.json
kind: Blueprint
metadata:
  name: tailscale-operator
spec:
  description: |
    Deploys the Tailscale Kubernetes operator with OAuth credentials. The operator registers services in your Tailnet, enabling secure private access to databases, caches, and other cluster resources from any device on your Tailnet.

    Prerequisites: configure ACLs and create an OAuth client in the Tailscale admin console. See the [Tailscale Kubernetes Operator quickstart](https://tailscale.com/docs/kubernetes-operator/quickstart) for full setup instructions.
  displayName: Tailscale Operator
  inputs:
    - name: clientId
      type: string
      isSecret: true
      displayName: Client ID
      description: Tailscale OAuth client ID.
    - name: clientSecret
      type: string
      isSecret: true
      displayName: Client Secret
      description: Tailscale OAuth client secret.
  installations:
    - service: tailscale-operator
      namespace: tailscale-operator
      releaseChannel: stable
      secrets:
        - name: operator-oauth
          values:
            - key: client_id
              valueFromInput: clientId
            - key: client_secret
              valueFromInput: clientSecret
      config: |
        installCRDs: true
        oauthSecretVolume:
          secret:
            secretName: '{{ k8sSecretName "operator-oauth" }}'
            items:
              - key: client_id
                path: client_id
              - key: client_secret
                path: client_secret
  outputs:
    - name: namespace
      type: string
      displayName: Namespace
      description: Kubernetes namespace where the operator is deployed.
      from: tailscale-operator
  distribution: marketplace-unmanaged
