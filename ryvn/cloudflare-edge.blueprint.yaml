# yaml-language-server: $schema=https://api.ryvn.app/v1/schemas/resources.json
kind: Blueprint
metadata:
  name: cloudflare-edge
spec:
  description: |
    Put Cloudflare in front of your Ryvn environment. Cloudflare proxies your hostnames to Ryvn's origin over mutual TLS (Authenticated Origin Pulls), and can apply WAF rules to the proxied traffic.
  displayName: Cloudflare Edge
  inputGroups:
    - name: cloudflare
      displayName: Cloudflare Zone
      description: Your Cloudflare zone and a token to manage it.
    - name: proxy
      displayName: Proxy & Origin mTLS
      description: The hostnames to proxy to your Ryvn origin, and the client certificate for mutual TLS.
    - name: waf
      displayName: Web Application Firewall (WAF)
      description: Optional firewall rules for your proxied hostnames.
  inputs:
    - name: cloudflareApiToken
      type: string
      isSecret: true
      displayName: Cloudflare API Token
      description: "Cloudflare API token scoped to this zone. [How to create this token](https://github.com/ryvn-technologies/blueprints/blob/main/cloudflare/cloudflare-edge/README.md#cloudflare-api-token)."
      group: cloudflare
    - name: zoneId
      type: string
      displayName: Zone ID
      description: ID of the Cloudflare zone, from the zone's overview page.
      group: cloudflare
    - name: rulesetNamePrefix
      type: string
      default: ryvn
      displayName: Ruleset Name Prefix
      description: Prefix for the Cloudflare rulesets created in your zone.
      group: cloudflare
    - name: hostnames
      type: array
      default: []
      displayName: Proxied Hostnames
      description: Hostnames to proxy, such as api.example.com (no wildcards).
      group: proxy
    - name: originHostname
      type: string
      displayName: Ryvn Origin Hostname
      description: Public hostname of your Ryvn environment's gateway.
      group: proxy
    - name: authenticatedOriginPullsCertificateId
      type: string
      displayName: Client Certificate ID (AOP)
      description: ID of an existing Cloudflare client certificate for Authenticated Origin Pulls.
      group: proxy
    - name: originPort
      type: number
      default: 443
      displayName: Origin Port
      description: Port Cloudflare connects to on your origin.
      group: proxy
    - name: originSni
      type: string
      default: ""
      displayName: Origin SNI
      description: SNI Cloudflare sends to the origin. Leave blank to use the request hostname.
      group: proxy
    - name: waf
      type: string
      multiline: true
      default: ""
      displayName: WAF Configuration
      description: |
        WAF rules for your proxied hostnames, as YAML. Disabled by default; set enabled: true and turn on at least one rule. Rules are scoped to your hostnames automatically. See the module README for the full schema and options.

        Example:
        ```yaml
        enabled: true
        managed_rules:
          cloudflare_managed:
            enabled: true
          owasp:
            enabled: true
            action: log
            paranoia_level: 1
            score_threshold: 60
        ```
      group: waf
  installations:
    - service: cloudflare-edge
      name: cloudflare-edge
      provisionsInfrastructure: true
      config: |
        cloudflare_api_token: '{{ k8sSecretValue "cloudflare-api-token" "api_token" }}'
        zone_id: '{{ input "zoneId" }}'
        ruleset_name_prefix: '{{ input "rulesetNamePrefix" }}'
        hostnames: {{ input "hostnames" | toJson }}
        origin_hostname: '{{ input "originHostname" }}'
        origin_port: {{ input "originPort" }}
        origin_sni: '{{ input "originSni" }}'
        authenticated_origin_pulls_certificate_id: '{{ input "authenticatedOriginPullsCertificateId" }}'
        {{- if input "waf" | trim }}
        waf:
        {{- input "waf" | nindent 2 }}
        {{- else }}
        waf:
          enabled: false
        {{- end }}
      secrets:
        - name: cloudflare-api-token
          values:
            - key: api_token
              valueFromInput:
                name: cloudflareApiToken
      releaseChannel: stable
  distribution: marketplace-managed
