name: Build & Release cloudfront-edge

on:
  workflow_dispatch:
  push:
    branches:
      - "main"
    paths:
      - "aws/cloudfront-edge/**"
      - ".github/workflows/ryvn-cloudfront-edge-release.yaml"
  pull_request:
    paths:
      - "aws/cloudfront-edge/**"
      - ".github/workflows/ryvn-cloudfront-edge-release.yaml"

jobs:
  release:
    uses: ryvn-technologies/ryvn-build-action/.github/workflows/release.yml@v2
    with:
      service_name: cloudfront-edge
    permissions:
      contents: write
      id-token: write
    secrets:
      RYVN_CLIENT_ID: ${{ secrets.RYVN_CLIENT_ID }}
      RYVN_CLIENT_SECRET: ${{ secrets.RYVN_CLIENT_SECRET }}
