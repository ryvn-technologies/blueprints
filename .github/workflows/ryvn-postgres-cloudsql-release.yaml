name: Build & Release postgres-cloudsql

on:
  workflow_dispatch:
  push:
    branches:
      - "main"
    paths:
      - "gcp/postgres-cloudsql/**"
      - ".github/workflows/ryvn-postgres-cloudsql-release.yaml"
  pull_request:
    paths:
      - "gcp/postgres-cloudsql/**"

jobs:
  release:
    uses: ryvn-technologies/ryvn-build-action/.github/workflows/release.yml@v2
    with:
      service_name: postgres-cloudsql
    permissions:
      contents: write
      id-token: write
    secrets:
      RYVN_CLIENT_ID: ${{ secrets.RYVN_CLIENT_ID }}
      RYVN_CLIENT_SECRET: ${{ secrets.RYVN_CLIENT_SECRET }}
