name: Build & Release memorystore-redis

on:
  workflow_dispatch:
  push:
    branches:
      - "main"
    paths:
      - "gcp/memorystore-redis/**"
      - ".github/workflows/ryvn-memorystore-redis-release.yaml"
  pull_request:
    paths:
      - "gcp/memorystore-redis/**"

jobs:
  release:
    uses: ryvn-technologies/ryvn-build-action/.github/workflows/release.yml@v2
    with:
      service_name: memorystore-redis
    permissions:
      contents: write
      id-token: write
    secrets:
      RYVN_CLIENT_ID: ${{ secrets.RYVN_CLIENT_ID }}
      RYVN_CLIENT_SECRET: ${{ secrets.RYVN_CLIENT_SECRET }}
